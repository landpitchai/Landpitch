<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LandPitch AI — Turn plot в investment deal in 15 minutes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0D1B2A;
    --paper: #F7F3EE;
    --gold: #C9922A;
    --gold-l: #F0D9A8;
    --blue: #1A3A5C;
    --blue-l: #D6E8F7;
    --sage: #4A6741;
    --sage-l: #D4E6CF;
    --rust: #8B3A2A;
    --mist: #E8EFF5;
    --white: #FFFFFF;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    overflow-x: hidden;
  }

  /* ─── NOISE TEXTURE ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    background: rgba(247,243,238,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(201,146,42,0.15);
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  .logo span { color: var(--gold); }

  nav a {
    font-size: 13px;
    font-weight: 500;
    color: var(--blue);
    text-decoration: none;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  nav a:hover { opacity: 1; }

  .nav-cta {
    background: var(--ink);
    color: var(--paper) !important;
    padding: 10px 24px;
    border-radius: 2px;
    opacity: 1 !important;
    transition: background 0.2s !important;
  }
  .nav-cta:hover { background: var(--blue) !important; }

  .nav-links { display: flex; gap: 36px; align-items: center; }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
    overflow: hidden;
  }

  .hero-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 140px 64px 80px 80px;
    position: relative;
    z-index: 2;
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 32px;
  }
  .hero-tag::before {
    content: '';
    width: 32px; height: 1px;
    background: var(--gold);
  }

  .hero-h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 5.5vw, 80px);
    font-weight: 600;
    line-height: 1.05;
    color: var(--ink);
    margin-bottom: 28px;
  }
  .hero-h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .hero-sub {
    font-size: 16px;
    font-weight: 300;
    line-height: 1.7;
    color: #4A5568;
    max-width: 440px;
    margin-bottom: 48px;
  }

  .hero-actions { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 16px 36px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    border-radius: 2px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: translateX(-101%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 0;
  }
  .btn-primary:hover::after { transform: translateX(0); }
  .btn-primary span { position: relative; z-index: 1; }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--blue);
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    padding: 16px 0;
    border-bottom: 1px solid currentColor;
    transition: color 0.2s;
  }
  .btn-ghost:hover { color: var(--gold); }

  .hero-stats {
    display: flex;
    gap: 40px;
    margin-top: 60px;
    padding-top: 40px;
    border-top: 1px solid rgba(201,146,42,0.2);
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }
  .stat-num span { color: var(--gold); font-size: 22px; }
  .stat-label { font-size: 11px; font-weight: 500; color: #888; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 6px; }

  /* ─── HERO RIGHT ─── */
  .hero-right {
    position: relative;
    background: var(--blue);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-right::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(201,146,42,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(74,103,65,0.2) 0%, transparent 50%);
  }

  /* Map grid decoration */
  .map-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .hero-card {
    position: relative;
    z-index: 2;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    border-radius: 8px;
    padding: 36px;
    width: 340px;
    margin: 20px;
    animation: float 6s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: white;
    margin-bottom: 20px;
    line-height: 1.3;
  }
  .card-concept {
    background: rgba(201,146,42,0.15);
    border: 1px solid rgba(201,146,42,0.3);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .concept-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--gold-l);
    margin-bottom: 4px;
  }
  .concept-roi {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
  }

  .card-bar {
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin: 20px 0 8px;
    overflow: hidden;
    position: relative;
  }
  .card-bar-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--gold), #E8B86D);
    border-radius: 2px;
    animation: fill 3s ease-out infinite;
  }
  @keyframes fill {
    0% { width: 0%; }
    60% { width: 78%; }
    100% { width: 78%; }
  }
  .card-status {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    display: flex;
    justify-content: space-between;
  }

  .agent-dots {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .dot.active { background: var(--gold); border-color: var(--gold); }
  .dot.done { background: var(--sage); border-color: var(--sage); }

  /* ─── SECTION COMMON ─── */
  section { position: relative; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gold-l);
    max-width: 60px;
  }

  .section-h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 4vw, 58px);
    font-weight: 600;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 20px;
  }

  /* ─── PROBLEM ─── */
  .problem {
    background: var(--ink);
    padding: 100px 80px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .problem .section-label { color: var(--gold-l); }
  .problem .section-label::after { background: rgba(201,146,42,0.3); }
  .problem .section-h2 { color: white; }
  .problem-sub { font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.6); }

  .pain-list { display: flex; flex-direction: column; gap: 16px; }
  .pain-item {
    display: flex;
    gap: 16px;
    padding: 20px 24px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    transition: background 0.2s;
  }
  .pain-item:hover { background: rgba(255,255,255,0.07); }
  .pain-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
  .pain-title { font-size: 14px; font-weight: 600; color: white; margin-bottom: 4px; }
  .pain-desc { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.5; }

  /* ─── HOW IT WORKS ─── */
  .how {
    padding: 100px 80px;
    background: var(--paper);
  }
  .how-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 64px;
  }
  .how-header-left { max-width: 500px; }
  .how-time {
    font-size: 13px;
    color: #888;
    text-align: right;
  }
  .how-time strong {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 4px;
  }

  .agents-grid { display: flex; flex-direction: column; gap: 0; }

  .agent-row {
    display: grid;
    grid-template-columns: 60px 1fr 1fr;
    gap: 0;
    position: relative;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.5s ease;
  }
  .agent-row.visible { opacity: 1; transform: translateY(0); }

  .agent-num {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 28px;
  }
  .num-circle {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }
  .num-line {
    width: 1px;
    flex: 1;
    min-height: 40px;
    background: linear-gradient(to bottom, currentColor, transparent);
    margin-top: 8px;
    opacity: 0.3;
  }

  .agent-content {
    padding: 24px 32px 32px 24px;
    border-left: none;
  }
  .agent-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .agent-trigger {
    font-size: 12px;
    color: #888;
    margin-bottom: 12px;
    font-style: italic;
  }
  .agent-tasks { list-style: none; }
  .agent-tasks li {
    font-size: 13px;
    color: #555;
    line-height: 1.6;
    padding: 3px 0;
    padding-left: 16px;
    position: relative;
  }
  .agent-tasks li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--gold);
    font-size: 11px;
  }

  .agent-tools-badge {
    grid-column: 3;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 24px;
    border-left: 1px solid var(--gold-l);
    margin-left: 0;
  }
  .tools-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .tool-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: var(--mist);
    color: var(--blue);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 100px;
    border: 1px solid var(--blue-l);
  }
  .agent-output {
    margin-top: 16px;
    padding: 10px 14px;
    background: var(--sage-l);
    border-radius: 4px;
    font-size: 12px;
    color: var(--sage);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* agent colors */
  .c1 .num-circle { background: var(--blue); }
  .c1 .num-line { color: var(--blue); }
  .c2 .num-circle { background: var(--sage); }
  .c2 .num-line { color: var(--sage); }
  .c3 .num-circle { background: var(--gold); }
  .c3 .num-line { color: var(--gold); }
  .c4 .num-circle { background: var(--rust); }
  .c4 .num-line { color: var(--rust); }
  .c5 .num-circle { background: #6B48A0; }
  .c5 .num-line { color: #6B48A0; }

  /* ─── PRICING ─── */
  .pricing {
    background: var(--mist);
    padding: 100px 80px;
  }
  .pricing-header { text-align: center; margin-bottom: 64px; }
  .pricing-header .section-label { justify-content: center; }
  .pricing-header .section-label::after { display: none; }
  .pricing-header .section-label::before {
    content: '';
    width: 60px; height: 1px;
    background: var(--gold-l);
  }

  .plans { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 960px; margin: 0 auto; }

  .plan {
    background: white;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 6px;
    padding: 40px 32px;
    position: relative;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .plan:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
  .plan.featured {
    background: var(--ink);
    border-color: var(--gold);
    color: white;
    transform: scale(1.03);
  }
  .plan.featured:hover { transform: scale(1.03) translateY(-4px); }

  .plan-badge {
    position: absolute;
    top: -12px; left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: white;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 100px;
  }
  .plan-name {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
  }
  .plan-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }
  .plan.featured .plan-price { color: white; }
  .plan:not(.featured) .plan-price { color: var(--ink); }
  .plan-period {
    font-size: 13px;
    color: #888;
    margin-bottom: 32px;
  }
  .plan.featured .plan-period { color: rgba(255,255,255,0.5); }

  .plan-features { list-style: none; margin-bottom: 36px; }
  .plan-features li {
    font-size: 13px;
    line-height: 1.6;
    padding: 8px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    display: flex;
    gap: 10px;
  }
  .plan.featured .plan-features li { border-color: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }
  .check { color: var(--sage); font-size: 14px; flex-shrink: 0; }
  .plan.featured .check { color: var(--gold); }

  .plan-btn {
    display: block;
    width: 100%;
    padding: 14px;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    border-radius: 2px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
  }
  .plan:not(.featured) .plan-btn {
    background: var(--ink);
    color: white;
  }
  .plan:not(.featured) .plan-btn:hover { background: var(--blue); }
  .plan.featured .plan-btn {
    background: var(--gold);
    color: white;
  }
  .plan.featured .plan-btn:hover { background: #B8821F; }

  /* ─── FORM ─── */
  .form-section {
    padding: 100px 80px;
    background: var(--paper);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }

  .form-left { padding-top: 20px; }
  .form-promise {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-top: 40px;
  }
  .promise-item { display: flex; gap: 16px; align-items: flex-start; }
  .promise-icon {
    width: 40px; height: 40px;
    background: var(--gold-l);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .promise-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .promise-desc { font-size: 13px; color: #777; line-height: 1.5; }

  .contact-form {
    background: white;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 8px;
    padding: 48px 40px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.06);
  }
  .form-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .form-subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }

  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 8px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 13px 16px;
    border: 1px solid #DDD;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--paper);
    transition: border-color 0.2s;
    outline: none;
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--gold);
    background: white;
  }
  .field textarea { min-height: 90px; resize: vertical; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    margin-top: 8px;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .submit-btn:hover { background: var(--gold); }

  .form-note {
    text-align: center;
    font-size: 11px;
    color: #AAA;
    margin-top: 16px;
  }

  /* ─── FOOTER ─── */
  footer {
    background: var(--ink);
    padding: 40px 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(201,146,42,0.2);
  }
  .footer-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 700;
    color: white;
  }
  .footer-logo span { color: var(--gold); }
  .footer-copy { font-size: 12px; color: rgba(255,255,255,0.35); }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-tag { animation: fadeUp 0.6s ease both; }
